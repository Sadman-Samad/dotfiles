# Theme configuration - try omarchy first, fallback to catppuccin
general.import = [ "~/.config/omarchy/current/theme/alacritty.toml" ]
# Fallback theme if omarchy not available
# general.import = [ "~/.config/alacritty/catppuccin_mocha.toml" ]

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/usr/bin/zsh"
args = ["-l"]

# Font configuration - CaskaydiaMono preferred, JetBrainsMono fallback
[font]
size = 15

[font.normal]
family = "CaskaydiaMono Nerd Font"
style = "Regular"

[font.bold]
family = "CaskaydiaMono Nerd Font"
style = "Bold"

[font.italic]
family = "CaskaydiaMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "CaskaydiaMono Nerd Font"
style = "Bold Italic"

# Fallback fonts if CaskaydiaMono not available
# [font.normal]
# family = "JetBrainsMono Nerd Font"
# style = "Regular"
#
# [font.bold]
# family = "JetBrainsMono Nerd Font"
# style = "Bold"
#
# [font.italic]
# family = "JetBrainsMono Nerd Font"
# style = "Italic"
#
# [font.bold_italic]
# family = "JetBrainsMono Nerd Font"
# style = "Bold Italic"

# Window configuration
[window]
padding.x = 14
padding.y = 14
decorations = "None"
opacity = 0.80

# Keyboard bindings
[keyboard]
bindings = [
    { key = "F11", action = "ToggleFullscreen" },
{ key = "Insert", mods = "Shift", action = "Paste" },
{ key = "Insert", mods = "Control", action = "Copy" }
]

[terminal]
