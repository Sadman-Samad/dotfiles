# Kitty terminal — Catppuccin Mocha

# ─── Fonts ────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0

# Disable cursor blinking
cursor_blink_interval 0
cursor_shape beam
cursor_beam_thickness 1.6

# ─── Colors: Catppuccin Mocha ─────────────────────────────────────
include catppuccin-mocha.conf

# ─── Window ───────────────────────────────────────────────────────
background_opacity 0.92
background_blur 6

window_padding_width 8 12
window_margin_width 0
hide_window_decorations yes

# Slightly rounded corners (kitty 0.46+)
window_border_width 0
active_border_color #b4befe
inactive_border_color #313244

# Scrollback
scrollback_lines 100000
wheel_scroll_multiplier 5

# Mouse
url_color #89b4fa
url_style curly
open_url_modifiers ctrl
copy_on_select no
rectangle_select_modifiers ctrl+alt
select_by_word_characters :@-./_~?&=%+#

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Tab bar
tab_bar_min_tabs 2
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}:{title}"

# Shell integration (auto-detected via kitty-shell-integration pkg)
shell_integration enabled

# ─── Advanced ─────────────────────────────────────────────────────
remember_window_size  no
initial_window_width  1000
initial_window_height 700
repaint_delay 8
input_delay 2
sync_to_monitor yes

# Allow remote control (for tab/session scripts)
allow_remote_control yes
listen_on unix:/tmp/kitty

# macOS / Wayland backends
wayland_enable_ime yes

# Editor for editing scrollback / shell integration
editor $EDITOR
