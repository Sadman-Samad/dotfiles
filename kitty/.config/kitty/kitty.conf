# Theme configuration - try omarchy first, fallback to catppuccin
include ~/.config/omarchy/current/theme/kitty.conf
# Fallback theme if omarchy not available
# include catppuccin_mocha.conf

# Shell
shell /usr/bin/zsh

# Font configuration - CaskaydiaMono preferred, JetBrainsMono fallback
font_family      CaskaydiaMono Nerd Font
bold_font        CaskaydiaMono Nerd Font Bold
italic_font      CaskaydiaMono Nerd Font Italic
bold_italic_font CaskaydiaMono Nerd Font Bold Italic
font_size        16.0

# Fallback fonts if CaskaydiaMono not available
# font_family      JetBrainsMono Nerd Font
# bold_font        JetBrainsMono Nerd Font Bold
# italic_font      JetBrainsMono Nerd Font Italic
# bold_italic_font JetBrainsMono Nerd Font Bold Italic

# Window configuration
window_padding_width 14
window_padding_height 14
hide_window_decorations yes
show_window_resize_notification no
confirm_os_window_close 0
background_opacity 0.90

# Terminal configuration
term xterm-256color
shell_integration enabled

# Performance optimization
repaint_delay 8
input_delay 2
sync_to_monitor yes
wayland_enable_ime no

# Mouse configuration
copy_on_select yes
strip_trailing_spaces smart

# Advanced configuration
single_instance yes
allow_remote_control yes
listen_on unix:/tmp/kitty

# Bell configuration
enable_audio_bell no
visual_bell_duration 0.0

# Aesthetics
cursor_shape block

# Tab bar styling
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# URL handling
url_color #F5E0DC
url_style straight
open_url_with default
detect_urls yes

# Image support
image_max_size 0  # No limit on image size

# Scrollback configuration
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Clipboard keybindings
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Window management keybindings
map F11 toggle_fullscreen
map ctrl+shift+f2 new_window_with_cwd
map ctrl+shift+f5 launch --location=hsplit --cwd=current
map ctrl+shift+f6 launch --location=vsplit --cwd=current

# Kitten shortcuts
map f1 launch --type=overlay --stdin-source=@screen_scrollback kitty +kitten less
map f2 launch --type=overlay --stdin-source=@screen_scrollback kitty +kitten grep
map f3 launch --type=overlay kitty +kitten unicode_input
map f4 launch --type=overlay kitty +kitten choose_file

# Diff integration
map ctrl+shift+d launch --type=tab --cwd=current kitty +kitten diff
