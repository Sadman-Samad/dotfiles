# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser
$mainMod = SUPER

bindd = SUPER, return, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private
bindd = SUPER, N, Editor, exec, omarchy-launch-editor
bindd = SUPER, T, Activity, exec, $terminal -e btop
bindd = SUPER, D, Docker, exec, $terminal -e lazydocker
bindd = SUPER, G, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"
bindd = SUPER, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER, slash, Passwords, exec, uwsm app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
bindd = SUPER SHIFT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER ALT, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu


# My Custom Keybinding
# Move focus like vim motion

bind = Ctrl+Super, h,movefocus ,l
bind = Ctrl+Super, l,movefocus ,r
bind = Ctrl+Super, k,movefocus ,u
bind = Ctrl+Super, j,movefocus ,d

# Workspace bindings
# Super + 1-0 for workspaces 1-10
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Ctrl + Super + 1-0 for workspaces 11-20
bind = Ctrl+SUPER, 1, workspace, 11
bind = Ctrl+SUPER, 2, workspace, 12
bind = Ctrl+SUPER, 3, workspace, 13
bind = Ctrl+SUPER, 4, workspace, 14
bind = Ctrl+SUPER, 5, workspace, 15
bind = Ctrl+SUPER, 6, workspace, 16
bind = Ctrl+SUPER, 7, workspace, 17
bind = Ctrl+SUPER, 8, workspace, 18
bind = Ctrl+SUPER, 9, workspace, 19
bind = Ctrl+SUPER, 0, workspace, 20

# Move active window to workspace
# Super + Shift + 1-0 for workspaces 1-10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Ctrl + Super + Shift + 1-0 for workspaces 11-20
bind = Ctrl+SUPER SHIFT, 1, movetoworkspace, 11
bind = Ctrl+SUPER SHIFT, 2, movetoworkspace, 12
bind = Ctrl+SUPER SHIFT, 3, movetoworkspace, 13
bind = Ctrl+SUPER SHIFT, 4, movetoworkspace, 14
bind = Ctrl+SUPER SHIFT, 5, movetoworkspace, 15
bind = Ctrl+SUPER SHIFT, 6, movetoworkspace, 16
bind = Ctrl+SUPER SHIFT, 7, movetoworkspace, 17
bind = Ctrl+SUPER SHIFT, 8, movetoworkspace, 18
bind = Ctrl+SUPER SHIFT, 9, movetoworkspace, 19
bind = Ctrl+SUPER SHIFT, 0, movetoworkspace, 20

# reload
bindr = $mainMod, r, exec, hyprctl reload; killall ags ydotool; ags & # [hidden]

bind = $mainMod, m, fullscreen, 0


bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, Q, killactive,
bind = $mainMod+Shift+Alt, Q, exec, hyprctl kill # Pick and kill a window
