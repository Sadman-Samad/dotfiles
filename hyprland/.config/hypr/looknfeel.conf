# Look & feel — Catppuccin Mocha · Ethereal accents (peach + indigo)

$accent      = rgba(7d82d9ff)
$accentSoft  = rgba(7d82d9aa)
$peach       = rgba(ffceadff)
$dimBorder   = rgba(3c486d66)

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $peach $accent 45deg
    col.inactive_border = $dimBorder
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.08

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1e1e2eff)
        scale = 0.9
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutSine, 0.37, 0, 0.63, 1
    bezier = snappy, 0.16, 1, 0.3, 1
    animation = windows, 1, 4, easeOutQuint, slide
    animation = windowsOut, 1, 4, easeOutQuint, slide
    animation = border, 1, 6, easeInOutSine
    animation = borderangle, 1, 100, easeInOutSine, loop
    animation = fade, 1, 4, easeOutQuint
    animation = workspaces, 1, 4, easeOutQuint, slide
    animation = workspacesIn, 1, 4, easeOutQuint, slide
    animation = specialWorkspace, 1, 3, easeInOutSine, slidefade
}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

# https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master
    mfact = 0.55
}

# Misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = true
}

# Opacity rules for common apps (frosted-glass feel)
decoration:dim_special = 0.2
