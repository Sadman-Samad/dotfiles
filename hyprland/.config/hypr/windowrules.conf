# Window rules — https://wiki.hyprland.org/Configuring/Window-Rules/

# Float common utility windows
windowrule = float, class:^(org.gnome.Nautilus|nautilus|Nemo|thunar|pcmanfm)$
windowrule = float, class:^(file-roller|org.gnome.FileRoller)$
windowrule = float, class:^(org.gnome.Calculator|gnome-calculator)$
windowrule = float, class:^(pavucontrol|org.pulseaudio.pavucontrol)$
windowrule = float, class:^(nm-connection-editor|org.gnome.NetworkDisplays)$
windowrule = float, class:^(org.gnome.Settings|gnome-settings)$
windowrule = float, class:^(wofi|Rofi)$
windowrule = float, class:^(org.keepassxc.KeePassXC)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, title:^(Authentication Required)$
windowrule = float, class:^(org.freedesktop.impl.portal.desktop.gtk)$

# Center wofi
windowrule = center, class:^(wofi|Rofi)$
windowrule = animation, slide, class:^(wofi|Rofi)$

# No blur for screen-sharing windows
windowrule = noanim, class:^(xdg-desktop-portal-hyprland)$

# Pin PiP window on top
windowrule = pin, title:^(Picture-in-Picture)$
windowrule = keepaspectratio, title:^(Picture-in-Picture)$

# Browser transparency (subtle)
windowrulev2 = opacity 0.95 0.85, class:^(firefox|chromium|google-chrome|zen-alpha)$

# Games: disable focus steal
windowrule = fullscreen, class:^(steam_app_)$

# Workspace assignments (uncomment to pin apps to workspaces)
# windowrule = workspace 2 silent, class:^(firefox|zen-alpha)$
# windowrule = workspace 3 silent, class:^(Code|code-url-handler)$
# windowrule = workspace 4 silent, class:^(discord|Signal|telegram-desktop)$
# windowrule = workspace 5 silent, class:^(Spotify)$

# Inhibit idle when fullscreen (games, videos)
windowrulev2 = idleinhibit fullscreen, class:.*
