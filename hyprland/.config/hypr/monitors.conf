# Monitor configuration
# Run `hyprctl monitors` once logged in to see detected displays.
# Format: monitor = <port>,<resolution>@<refresh>,<position>,<scale>

# Auto-detect all monitors at preferred resolution, scale 1
monitor = , preferred, auto, 1

# Example: force a specific monitor (uncomment & adjust)
# monitor = DP-1, 2560x1440@144, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1

# 10 workspaces (Mod+1..0)
workspace = 1, default:true
