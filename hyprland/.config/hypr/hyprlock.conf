# Hyprlock — screen locker
# Catppuccin Mocha palette: base #1e1e2e, text #cdd6f4, peach #ffcead, lavender #b4befe

$accent = rgba(b4befeff)
$peach  = rgba(ffceadff)
$base   = rgba(1e1e2eff)
$surface= rgba(313244ff)
$text   = rgba(cdd6f4ff)
$subtle = rgba(a6adc8ff)

general {
    ignore_empty_input = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = false
}

# Blurred wallpaper backdrop
background {
    monitor =
    color = $base
    path = ~/.local/share/wallpapers/catppuccin-mocha.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.17
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = fadeIn, 1, 5, easeOutQuint
    animation = fadeOut, 1, 5, easeOutQuint
    animation = inputFieldDots, 1, 2, linear
}

# Big clock
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_size = 130
    font_family = JetBrainsMono Nerd Font ExtraBold
    color = $text
    position = 0, 230
    halign = center
    valign = center
}

# Date below clock
label {
    monitor =
    text = cmd[update:0] echo "$(date +'%A, %B %d')"
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    color = $subtle
    position = 0, 130
    halign = center
    valign = center
}

# User@host
label {
    monitor =
    text = $USER
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = $peach
    position = 0, -200
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true
    outer_color = $accent
    inner_color = $surface
    font_color = $text
    fade_on_empty = true
    placeholder_text = <span foreground="##a6adc8"><i>Enter password...</i></span>
    hide_input = false
    position = 0, -260
    halign = center
    valign = center
}
