# Environment variables — NVIDIA + Wayland essentials
# https://wiki.hyprland.org/Configuring/Environment-Variables/

# NVIDIA driver tweaks for Hyprland (NOT software rendering)
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0
# Hardware cursors may need disabling on some NVIDIA setups; enable by default
# (Hyprland 0.45+ handles NVIDIA cursors natively — no WLR_NO_HARDWARE_CURSORS)

# XDG / toolkit
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_CURRENT_DESKTOP,Hyprland
# GTK theming (GTK_THEME env is read by GTK4 too)
env = GTK_THEME,catppuccin-mocha-lavender-standard+default:dark

# Qt rendering on Wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# SDL / Firefox Wayland
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1

# Cursor size (24 = default)
# Cursor theme
env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
env = HYPRCURSOR_THEME,catppuccin-mocha-dark-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Java apps
env = _JAVA_AWT_WM_NONREPARENTING,1

# Default apps
$terminal = kitty
$browser = firefox
$menu = wofi --show drun
$fileManager = nautilus
