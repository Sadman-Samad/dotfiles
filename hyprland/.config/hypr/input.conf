# Input devices — https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_options = compose:caps
    repeat_rate = 40
    repeat_delay = 600
    numlock_by_default = true

    touchpad {
        scroll_factor = 0.4
    }

    # Follow mouse focus (like i3)
    follow_mouse = 1
    sensitivity = 0
}

gestures {
    workspace_swipe = false
}

# Per-device config: run `hyprctl devices` to list
# device {
#     name = <device-name>
#     sensitivity = -0.5
# }
