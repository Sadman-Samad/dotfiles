# Autostart — runs once per Hyprland session

# Daemonize background services
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/libexec/xdg-desktop-portal-hyprland
exec-once = /usr/libexec/xdg-desktop-portal-gtk
exec-once = /usr/libexec/hyprpolkitagent

# Status bar
exec-once = waybar

# Wallpaper
exec-once = hyprpaper

# Notifications
exec-once = swaync

# Idle management (lock after timeout)
exec-once = hypridle

# Clipboard manager
exec-once = wl-paste --watch cliphist store

# Network Manager applet
exec-once = nm-applet --indicator

# Blue light filter (optional, comment to disable)
# exec-once = wlsunset -T 4500 -t 3500

# Numlock on
exec-once = numlockx on
