# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

exec-once = [workspace 11 silent] alacritty -e zsh -c "tmux new -s Home; exec zsh"  
exec-once = [workspace 12 silent] firefox
exec-once = kdeconnect-indicator &
exec-once = waybar
exec-once = $HOME/dotfiles/bin/.local/script/fetch_wallpapers.sh 12
exec-once = $HOME/dotfiles/bin/.local/script/wallpaper_slideshow.sh 1800

