# Keybindings — i3/Hyprland conventions
# https://wiki.hyprland.org/Configuring/Binds/

$mainMod = SUPER
$term = $terminal
$menu = wofi --show drun
$browser = firefox

# Essential apps
bind = $mainMod, RETURN, exec, $term
bind = $mainMod SHIFT, RETURN, exec, $term --working-directory $HOME
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, nautilus
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, D, exec, $terminal -e btop
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod SHIFT, Q, killactive,

# Window state
bind = $mainMod, F, togglefloating,
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, P, pseudo,        # dwindle split toggle
bind = $mainMod, T, togglesplit,

# Focus (Vim-style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace,
bind = $mainMod SHIFT, S, movetoworkspace, special

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume keys
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5 && pamixer --get-volume > /tmp/.volume
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5 && pamixer --get-volume > /tmp/.volume
bindel = , XF86AudioMute, exec, pamixer -t
bindel = , XF86AudioMicMute, exec, pamixer --default-source -t

# Media keys
bindel = , XF86AudioPlay, exec, playerctl play-pause
bindel = , XF86AudioNext, exec, playerctl next
bindel = , XF86AudioPrev, exec, playerctl previous

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Screenshots (Hyprland native)
bind = , Print, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = $mainMod SHIFT, S, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = $mainMod, Print, exec, hyprshot -m output -o ~/Pictures/Screenshots

# Session controls (via wofi)
bind = $mainMod SHIFT, E, exec, wofi-logout
bind = $mainMod SHIFT, L, exec, hyprlock

# Reload config
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, ESCAPE, exec, killall -SIGUSR1 waybar
