# KDE Global Shortcuts Presets
# Use with kde-shortcuts script to quickly apply common shortcut configurations

# Krohnkite Tiling Manager Shortcuts
[krohnkite-default]
toggle_tile=Meta+F
toggle_float=Meta+Shift+F
set_master=Meta+Return
next_layout=Meta+\\
prev_layout=Meta+|
rotate=Meta+R
rotate_part=Meta+Shift+R

# Window Navigation
focus_down=Meta+J
focus_up=Meta+K
focus_left=Meta+H
focus_right=Meta+L

# Window Movement
push_window_down=Meta+Shift+J
push_window_up=Meta+Shift+K
push_window_left=Meta+Shift+H
push_window_right=Meta+Shift+L

# Master Area Control
increase_master_win_width=Meta+Ctrl+L
decrease_master_win_width=Meta+Ctrl+H
increase_master_win_count=Meta+Ctrl+J
decrease_master_win_count=Meta+Ctrl+K

# Alternative Krohnkite Layout (Vim-style)
[krohnkite-vim]
toggle_tile=Meta+T
toggle_float=Meta+Shift+T
set_master=Meta+M
focus_down=Meta+J
focus_up=Meta+K
focus_left=Meta+H
focus_right=Meta+L

# KWin Window Management
[kwin-enhanced]
Window\ Close=Alt+Q
Window\ Maximize=Meta+Up
Window\ Minimize=Meta+Down
Window\ Quick\ Tile\ Left=Meta+Left
Window\ Quick\ Tile\ Right=Meta+Right
Switch\ to\ Desktop\ 1=Meta+1
Switch\ to\ Desktop\ 2=Meta+2
Switch\ to\ Desktop\ 3=Meta+3
Switch\ to\ Desktop\ 4=Meta+4
Overview=Meta+Tab
ShowDesktopGrid=Meta+G

# System Shortcuts
[system-essentials]
# Plasma shortcuts
org.kde.krunner.desktop=Meta+Space
org.kde.plasma.emojier.desktop=Meta+.
org.kde.spectacle.desktop=Print

# Application shortcuts  
org.kde.konsole.desktop=Ctrl+Alt+T
org.kde.dolphin.desktop=Meta+E
org.kde.systemsettings.desktop=Meta+I

# Media controls
[media-controls]
media_play_pause=Media\ Play
media_stop=Media\ Stop
media_next=Media\ Next
media_previous=Media\ Previous
volume_up=Volume\ Up
volume_down=Volume\ Down
volume_mute=Volume\ Mute

# Developer Shortcuts
[developer-focused]
# Terminal and editors
org.kde.konsole.desktop=Ctrl+Alt+T
code.desktop=Meta+C
nvim.desktop=Meta+V

# Window management for coding
Window\ Quick\ Tile\ Left=Meta+H
Window\ Quick\ Tile\ Right=Meta+L
Window\ Quick\ Tile\ Top=Meta+K  
Window\ Quick\ Tile\ Bottom=Meta+J
Window\ Maximize=Meta+M
Overview=Meta+Tab

# Workspace switching
Switch\ to\ Desktop\ 1=Meta+1
Switch\ to\ Desktop\ 2=Meta+2
Switch\ to\ Desktop\ 3=Meta+3
Switch\ to\ Desktop\ 4=Meta+4

# Gaming Layout (Minimal shortcuts to avoid conflicts)
[gaming-minimal]
# Disable most shortcuts except essential ones
Window\ Close=Alt+F4
Overview=none
ShowDesktopGrid=none
Switch\ Window=none
Walk\ Through\ Windows=none

# Essential system shortcuts only
org.kde.krunner.desktop=Meta+Space
volume_up=Volume\ Up
volume_down=Volume\ Down
volume_mute=Volume\ Mute

# Accessibility Shortcuts
[accessibility]
# Larger shortcuts for easier access
toggle_tile=Meta+T
toggle_float=Meta+F
Window\ Close=Meta+Q
Window\ Maximize=Meta+M
Overview=Meta+O
org.kde.krunner.desktop=Meta+R
org.kde.spectacle.desktop=Meta+S

# Custom Vim-like Navigation
[vim-navigation]
# Use Vi-style navigation throughout KDE
focus_down=Meta+J
focus_up=Meta+K
focus_left=Meta+H
focus_right=Meta+L
push_window_down=Meta+Shift+J
push_window_up=Meta+Shift+K  
push_window_left=Meta+Shift+H
push_window_right=Meta+Shift+L
Switch\ to\ Desktop\ 1=Meta+1
Switch\ to\ Desktop\ 2=Meta+2
Switch\ to\ Desktop\ 3=Meta+3
Switch\ to\ Desktop\ 4=Meta+4