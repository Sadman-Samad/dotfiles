# Limine Boot Configuration
# Timeout in seconds before default entry is booted
TIMEOUT=5

# Default boot entry (1-based index)
DEFAULT_ENTRY=1

# GUI Theme Configuration
THEME_NAME=afterburn
BACKGROUND_PATH=boot:///EFI/BOOT/background.png

# Enable verbose boot
VERBOSE=yes

# Boot Entries
# -----------------------------------------

# Arch Linux - Primary Entry
:Arch Linux
    PROTOCOL=linux
    KERNEL_PATH=boot:///EFI/Linux/omarchy_linux.efi
    KERNEL_CMDLINE=root=UUID=42F3-E6FB rw rootflags=umask=0077,uid=1000,gid=1000,i_version,1 quiet splash loglevel=3 mitigations=auto systemd.gpt_auto=1

# Arch Linux - Fallback Entry (if UKI becomes corrupted)
:Arch Linux (Fallback)
    PROTOCOL=linux
    KERNEL_PATH=boot:///EFI/Linux/omarchy_linux.efi
    KERNEL_CMDLINE=root=UUID=42F3-E6FB rw rootflags=umask=0077,uid=1000,gid=1000,i_version,1 emergency mitigations=auto systemd.gpt_auto=1

# Arch Linux - Verbose Mode (for debugging)
:Arch Linux (Verbose)
    PROTOCOL=linux
    KERNEL_PATH=boot:///EFI/Linux/omarchy_linux.efi
    KERNEL_CMDLINE=root=UUID=42F3-E6FB rw rootflags=umask=0077,uid=1000,gid=1000,i_version,1 verbose mitigations=auto systemd.gpt_auto=1

# Firmware Setup
:UEFI Firmware Settings
    PROTOCOL=efi
    KERNEL_PATH=boot:///EFI/BOOT/BOOTX64.EFI