set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"



# set prefix
set -g prefix C-Space
unbind C-b
bind-key C-Space send-prefix


unbind r
bind r source-file ~/.tmux.conf

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
setw -g mode-keys vi             # vim mode for copy mode

unbind %
bind | split-window -h


unbind '"'
bind - split-window -v

bind -r m resize-pane -Z

bind-key k select-pane -U
bind-key h select-pane -L
bind-key j select-pane -D
bind-key l select-pane -R

bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5

set-option -g status-position top

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'tmux-plugins/tmux-yank' # better clipboard integration
set -g @plugin 'omerxx/tmux-sessionx' # advanced session manager with zoxide integration
set -g @plugin 'omerxx/tmux-floax' # floating scratch terminal
set -g @plugin 'fcsonline/tmux-thumbs' # vimium-style hint mode for copying

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @resurrect-strategy-nvim 'session' # restore nvim sessions

# tmux-continuum settings
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# tmux-sessionx settings
set -g @sessionx-bind 's'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-filter-current 'false'
set -g @sessionx-bind-zo-new-window 'ctrl-y'

# tmux-floax settings
set -g @floax-bind 'p'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

# TMUX theme

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha' # latte,frappe, macchiato or mocha
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_icon " "
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_session_icon ""
set -g @catppuccin_session_text " #S  %I:%M %p"
set -g @catppuccin_date_time_icon "󰃰 "
set -g @catppuccin_date_time_text "%I:%M %p"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


